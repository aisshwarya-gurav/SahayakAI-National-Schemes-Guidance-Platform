<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sahayak AI</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <div class="container">

        <header class="header">

            <div class="logo">

                <h1>🇮🇳 Sahayak AI</h1>

                <p>Your Government Scheme Assistant</p>

            </div>

            <div class="online">

                <span class="dot"></span>

                Online

            </div>

        </header>

        <div id="chatBox" class="chat-box">

            <div class="message bot">

                <div class="bot-avatar">🤖</div>

                <div class="bubble">

                    <h3>Hello 👋</h3>

                    <p>
                        I'm <b>Sahayak AI</b>.
                    </p>

                    <p>
                        Tell me about yourself naturally.
                    </p>

                    <br>

                    <div class="example">

                        <b>Example</b>

                        <br><br>

                        I am a 22 year old girl studying in college.

                        <br>

                        My family income is ₹2,000 per month.

                        <br>

                        I belong to OBC category.

                        <br>

                        I live in Karnataka.

                    </div>

                </div>

            </div>

        </div>

        <<div class="input-area">

    <input
        type="text"
        id="userInput"
        placeholder="Type something like: I am a 22 year old OBC student from Karnataka..."
    >

    <button onclick="sendMessage()">
        ➤
    </button>

</div>

    </div>

    <script src="script.js"></script>

</body>

</html>
